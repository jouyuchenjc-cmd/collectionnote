<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Note</title>
<link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff6e0;
    --cream-card: rgba(255,255,255,0.55);
    --border: #c8cfd5;
    --text: #4d5a63;
    --text-sub: #8a9aa6;
    --mood-peace: #b5cfe8;
    --mood-thanks: #e5b5b5;
    --mood-pour: #ead3b9;
    --mood-release: #7f7f7f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  .page-wrapper {
    max-width: 440px;
    margin: 0 auto;
    padding: 36px 22px 100px;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-family: 'Sour Gummy', cursive;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease both;
  }

  /* ── D-DAY BOX ── */
  .dday-box {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 28px;
    text-align: center;
    margin-bottom: 16px;
    animation: fadeUp 0.65s ease 0.05s both;
  }

  .dday-label {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .dday-num-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }

  .dday-num {
    font-family: 'Sour Gummy', cursive;
    font-size: 44px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .dday-unit {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--text-sub);
  }

  .dday-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 12px;
    opacity: 0.65;
  }

  .dday-date {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  /* ── ILLUSTRATION BUTTON ── */
  .illus-btn {
    display: block;
    width: 100%;
    cursor: pointer;
    border: 1px solid #efe8dc;
    background: none;
    padding: 3px;
    border-radius: 22px;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
    animation: fadeUp 0.75s ease 0.1s both;
  }

  .illus-btn img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    object-position: top center;
    border-radius: 18px;
    display: block;
  }

  .illus-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 52px rgba(90,80,60,0.14);
  }

  .illus-btn:active {
    transform: scale(0.99);
    box-shadow: none;
  }

  /* ── COLLECTION NOTE ── */
  .cal-section {
    margin-top: 28px;
    animation: fadeUp 0.75s ease 0.15s both;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }

  .section-toggle {
    font-size: 11px;
    color: var(--text-sub);
    transition: transform 0.25s ease;
    display: inline-block;
    margin-left: 6px;
  }


  .cal-body {
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 2000px;
    opacity: 1;
  }

  .cal-body.collapsed {
    max-height: 0;
    opacity: 0;
  }

  .section-title {
    font-family: 'Sour Gummy', cursive;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-nav button {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s;
  }

  .month-nav button:hover { background: var(--border); }

  .month-label {
    font-size: 12px;
    color: var(--text);
    min-width: 68px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ── DAY STRIP ── */
  .day-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 16px;
  }

  .day-chip {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-sub);
    background: rgba(200,207,213,0.18);
    transition: all 0.18s ease;
  }

  .day-chip.has-entry {
    font-weight: 500;
    cursor: pointer;
  }

  .day-chip.has-entry.peace   { background: var(--mood-peace);  color: #3a5a7a; }
  .day-chip.has-entry.thanks  { background: var(--mood-thanks); color: #7a3a3a; }
  .day-chip.has-entry.pour    { background: var(--mood-pour);   color: #7a5a3a; }
  .day-chip.has-entry.release { background: var(--mood-release);color: #fff; }
  .day-chip.has-entry.no-mood { background: #c8cfd5; color: var(--text); }

  .day-chip.has-entry:hover {
    transform: scale(1.12);
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }

  /* ── ENTRY LIST ── */
  .entry-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .entry-card.hidden {
    display: none;
  }

  .show-more-btn {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text-sub);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.18s;
    margin-top: 2px;
  }

  .show-more-btn:hover {
    background: rgba(200,207,213,0.15);
    color: var(--text);
  }

  .entry-card {
    background: var(--cream-card);
    border: 1px solid rgba(200,207,213,0.5);
    border-radius: 14px;
    padding: 13px 16px;
    transition: background 0.18s;
    cursor: pointer;
  }

  .entry-card:hover { background: rgba(255,255,255,0.78); }

  /* 編輯 modal */
  .edit-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(58,51,40,0.42);
    backdrop-filter: blur(8px);
    z-index: 910;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }

  .edit-modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .edit-modal-box {
    background: var(--bg);
    width: 100%;
    max-width: 440px;
    border-radius: 24px 24px 0 0;
    padding: 22px 22px 44px;
    transform: translateY(100%);
    transition: transform 0.36s cubic-bezier(0.32,0.72,0,1);
  }

  .edit-modal-overlay.open .edit-modal-box {
    transform: translateY(0);
  }

  .edit-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .edit-modal-title {
    font-size: 13px;
    color: var(--text-sub);
    letter-spacing: 0.08em;
  }

  .edit-save-btn {
    padding: 6px 16px;
    border: none;
    border-radius: 20px;
    background: #4d5a63;
    color: #fff6e0;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.18s;
  }

  .edit-save-btn:hover { opacity: 0.8; }
  .edit-save-btn.loading { opacity: 0.5; pointer-events: none; }

  .edit-delete-btn {
    padding: 6px 16px;
    border: 1px solid rgba(200,207,213,0.6);
    border-radius: 20px;
    background: transparent;
    color: var(--text-sub);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.18s;
  }

  .edit-delete-btn:hover {
    border-color: #e5b5b5;
    color: #c05050;
  }

  .edit-btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .entry-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }

  .entry-date {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }

  .entry-mood {
    display: inline-flex;
    align-items: center;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    letter-spacing: 0.05em;
  }

  .entry-mood.peace   { background: var(--mood-peace);  color: #3a5a7a; }
  .entry-mood.thanks  { background: var(--mood-thanks); color: #7a3a3a; }
  .entry-mood.pour    { background: var(--mood-pour);   color: #7a5a3a; }
  .entry-mood.release { background: var(--mood-release);color: #fff; }

  .entry-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    letter-spacing: 0.03em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-sub);
    font-size: 12px;
    letter-spacing: 0.12em;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(58,51,40,0.42);
    backdrop-filter: blur(8px);
    z-index: 900;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: var(--bg);
    width: 100%;
    max-width: 440px;
    border-radius: 24px 24px 0 0;
    padding: 22px 22px 44px;
    transform: translateY(100%);
    transition: transform 0.36s cubic-bezier(0.32,0.72,0,1);
  }

  .modal-overlay.open .modal-box {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    letter-spacing: 0.03em;
  }

  .modal-sub {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }

  .mood-row {
    display: flex;
    gap: 7px;
    margin-bottom: 13px;
  }

  .mood-chip {
    flex: 1;
    padding: 7px 3px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 11px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    background: rgba(255,255,255,0.45);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .mood-chip.peace  { border-color: var(--mood-peace);  }
  .mood-chip.peace.active  { background: var(--mood-peace);  color: #3a5a7a; font-weight:500; }
  .mood-chip.thanks { border-color: var(--mood-thanks); }
  .mood-chip.thanks.active { background: var(--mood-thanks); color: #7a3a3a; font-weight:500; }
  .mood-chip.pour   { border-color: var(--mood-pour);   }
  .mood-chip.pour.active   { background: var(--mood-pour);   color: #7a5a3a; font-weight:500; }
  .mood-chip.release{ border-color: var(--mood-release);}
  .mood-chip.release.active{ background: var(--mood-release);color: #fff; font-weight:500; }

  textarea {
    width: 100%;
    min-height: 128px;
    padding: 12px 15px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: rgba(255,255,255,0.5);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.75;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }

  textarea::placeholder { color: var(--text-sub); font-size: 13px; }
  textarea:focus { border-color: #9aabb5; background: rgba(255,255,255,0.75); }

  .submit-btn {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: #4d5a63;
    color: #fff6e0;
    font-family: 'Sour Gummy', cursive;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.15s;
  }

  .submit-btn:hover { opacity: 0.82; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.loading { pointer-events: none; opacity: 0.5; }

  .toast {
    position: fixed;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #4d5a63;
    color: #fff6e0;
    padding: 9px 20px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: all 0.28s ease;
    z-index: 950;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid rgba(255,246,224,0.3);
    border-top-color: #fff6e0;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── LOCK SCREEN ── */
  .lock-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
  }

  .lock-screen.hidden {
    display: none;
  }

  .lock-icon {
    font-size: 48px;
    line-height: 1;
  }

  .lock-title {
    font-family: 'Sour Gummy', cursive;
    font-size: 18px;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .lock-sub {
    font-size: 12px;
    color: var(--text-sub);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
  }

  .lock-btn {
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    background: #4d5a63;
    color: #fff6e0;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: opacity 0.18s;
  }

  .lock-btn:hover { opacity: 0.82; }
  .lock-btn.secondary {
    background: transparent;
    color: var(--text-sub);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 9px 24px;
  }

  .faceid-setup-hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    z-index: 100;
  }
</style>

        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
    </div>

    <div class="day-strip" id="dayStrip"></div>

    <div class="cal-body" id="calBody">
      <div class="entry-list" id="entryList"><div class="empty-state">載入中…</div></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <p class="modal-title">To 濟公師父</p>
    <p class="modal-sub" id="modalDate"></p>
    <div class="mood-row">
      <button class="mood-chip peace"   data-mood="平靜" onclick="selectMood(this)">平靜</button>
      <button class="mood-chip thanks"  data-mood="感謝" onclick="selectMood(this)">感謝</button>
      <button class="mood-chip pour"    data-mood="傾訴" onclick="selectMood(this)">傾訴</button>
      <button class="mood-chip release" data-mood="釋放" onclick="selectMood(this)">釋放</button>
    </div>
    <textarea id="messageInput" placeholder="有什麼話，都可以在這裡說…"></textarea>
    <button class="submit-btn" id="submitBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="faceid-setup-hint" id="faceidHint" onclick="showFaceidSetup()" style="display:none">設定 Face ID 保護</div>

<!-- EDIT MODAL -->
<div class="edit-modal-overlay" id="editModalOverlay">
  <div class="edit-modal-box">
    <div class="modal-handle"></div>
    <div class="edit-modal-header">
      <span class="edit-modal-title" id="editModalDate"></span>
      <button class="edit-save-btn" id="editSaveBtn" onclick="saveEdit()">儲存</button>
    </div>
    <div class="mood-row">
      <button class="mood-chip peace"   data-mood="平靜" onclick="selectEditMood(this)">平靜</button>
      <button class="mood-chip thanks"  data-mood="感謝" onclick="selectEditMood(this)">感謝</button>
      <button class="mood-chip pour"    data-mood="傾訴" onclick="selectEditMood(this)">傾訴</button>
      <button class="mood-chip release" data-mood="釋放" onclick="selectEditMood(this)">釋放</button>
    </div>
    <textarea id="editMessageInput" placeholder="有什麼話，都可以在這裡說…"></textarea>
    <div class="edit-btn-row">
      <button class="edit-delete-btn" onclick="closeEditModal()">取消</button>
    </div>
  </div>
</div>

<script>
// !! Worker 路由是 /notion/v1/... !!
const API    = 'https://dry-band-d1ba.jouyu-chen-jc.workers.dev';
const DB_ID  = '32485e19-d1c6-8015-b232-cb354559a78d';
const TARGET = new Date('2026-05-22T00:00:00');

const moodClass = {'平靜':'peace','感謝':'thanks','傾訴':'pour','釋放':'release'};
let currentMood = '';
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth() + 1;

// D-DAY：用日期字串比較，不受時區影響
(function() {
  const now = new Date();
  const todayStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0');
  const today = new Date(todayStr + 'T00:00:00');
  const target = new Date('2026-05-22T00:00:00');
  const diff = Math.ceil((target - today) / 86400000);
  document.getElementById('ddayNum').textContent = diff > 0 ? diff : 0;
})();

// MODAL
const overlay = document.getElementById('modalOverlay');
document.getElementById('openModal').addEventListener('click', () => {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('modalDate').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
  overlay.classList.add('open');
});
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
function closeModal() { overlay.classList.remove('open'); }
function selectMood(el) {
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); currentMood = el.dataset.mood;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// SEND
async function sendMessage() {
  const msg = document.getElementById('messageInput').value.trim();
  if (!msg) { showToast('請先寫幾個字'); return; }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>傳送中…';
  btn.classList.add('loading');

  const now = new Date(), pad = n => String(n).padStart(2,'0');
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  const body = {
    parent: { database_id: DB_ID },
    properties: {
      Title:   { title:     [{ text: { content: todayStr } }] },
      Message: { rich_text: [{ text: { content: msg     } }] },
      Date:    { date:      { start: todayStr } },
      ...(currentMood ? { Mood: { select: { name: currentMood } } } : {})
    }
  };

  try {
    const resp = await fetch(`${API}/v1/pages`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      showToast('意念已傳送 ✦');
      closeModal();
      document.getElementById('messageInput').value = '';
      currentMood = '';
      document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
      const n = new Date();
      if (viewYear === n.getFullYear() && viewMonth === n.getMonth()+1) loadEntries();
    } else {
      const status = resp.status;
      console.error('POST /v1/pages failed:', status);
      showToast(`傳送失敗（HTTP ${status}）`);
    }
  } catch(e) {
    console.error('fetch error:', e);
    showToast('無法連線，請確認 Worker 設定');
  }

  btn.innerHTML = 'Send';
  btn.classList.remove('loading');
}

// LOAD
async function loadEntries() {
  document.getElementById('entryList').innerHTML = '<div class="empty-state">載入中…</div>';
  document.getElementById('dayStrip').innerHTML  = '';
  const y = viewYear, m = String(viewMonth).padStart(2,'0');
  const last = new Date(y, viewMonth, 0).getDate();
  try {
    const resp = await fetch(`${API}/v1/databases/${DB_ID}/query`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify({
        filter: { and: [
          { property:'Date', date:{ on_or_after:`${y}-${m}-01` } },
          { property:'Date', date:{ on_or_before:`${y}-${m}-${last}` } }
        ]},
        sorts: [{ property:'Date', direction:'descending' }]
      })
    });
    if (resp.ok) {
      const data = await resp.json();
      renderDayStrip(data.results || []);
      renderEntries(data.results || []);
    } else {
      renderDayStrip([]); renderEmpty('這個月還沒有記錄');
    }
  } catch(e) {
    renderDayStrip([]); renderEmpty('這個月還沒有記錄');
  }
}

function renderDayStrip(results) {
  const strip = document.getElementById('dayStrip');
  const last  = new Date(viewYear, viewMonth, 0).getDate();
  const dayMap = {};
  results.forEach(page => {
    const d = page.properties?.Date?.date?.start;
    if (!d) return;
    const day = parseInt(d.split('-')[2], 10);
    dayMap[day] = page.properties?.Mood?.select?.name || '';
  });
  let html = '';
  for (let d = 1; d <= last; d++) {
    if (dayMap[d] !== undefined) {
      const mc = moodClass[dayMap[d]] || 'no-mood';
      html += `<div class="day-chip has-entry ${mc}" title="${dayMap[d]}">${d}</div>`;
    } else {
      html += `<div class="day-chip">${d}</div>`;
    }
  }
  strip.innerHTML = html;
}

const SHOW_LIMIT = 3;

function renderEntries(results) {
  if (!results.length) { renderEmpty('這個月還沒有記錄'); return; }
  const list = document.getElementById('entryList');
  const cards = results.map((page, i) => {
    const props   = page.properties;
    const dateVal = props.Date?.date?.start || '';
    const msg     = (props.Message?.rich_text||[]).map(t=>t.plain_text||'').join('') || '（無內容）';
    const mood    = props.Mood?.select?.name || '';
    const mc      = moodClass[mood] || '';
    const hidden  = i >= SHOW_LIMIT ? ' hidden' : '';
    const msgSafe = msg.replace(/'/g, "\'");
    return `<div class="entry-card${hidden}" onclick="openEditModal('${page.id}','${dateVal}','${msgSafe}','${mood}')">
      <div class="entry-top">
        <span class="entry-date">${dateVal}</span>
        ${mood?`<span class="entry-mood ${mc}">${mood}</span>`:''}
      </div>
      <div class="entry-text">${esc(msg)}</div>
    </div>`;
  });

  const hasMore = results.length > SHOW_LIMIT;
  const remaining = results.length - SHOW_LIMIT;
  const showMoreBtn = hasMore
    ? `<button class="show-more-btn" id="showMoreBtn" onclick="toggleEntries(this, ${results.length})">
        展開全部 · 共 ${results.length} 筆
      </button>`
    : '';

  list.innerHTML = cards.join('') + showMoreBtn;
}

function toggleEntries(btn, total) {
  const hidden = document.querySelectorAll('.entry-card.hidden');
  if (hidden.length > 0) {
    hidden.forEach(el => el.classList.remove('hidden'));
    btn.textContent = '收合';
  } else {
    const cards = document.querySelectorAll('.entry-card');
    cards.forEach((el, i) => {
      if (i >= SHOW_LIMIT) el.classList.add('hidden');
    });
    btn.textContent = `展開全部 · 共 ${total} 筆`;
  }
}

function renderEmpty(msg) {
  document.getElementById('entryList').innerHTML = `<div class="empty-state">${msg}</div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateMonthLabel() {
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('monthLabel').textContent=`${months[viewMonth-1]}. ${viewYear}`;
}

document.getElementById('prevMonth').onclick = () => {
  viewMonth--; if (viewMonth<1){viewMonth=12;viewYear--;}
  updateMonthLabel(); loadEntries();
};
document.getElementById('nextMonth').onclick = () => {
  viewMonth++; if (viewMonth>12){viewMonth=1;viewYear++;}
  updateMonthLabel(); loadEntries();
};

updateMonthLabel();
loadEntries();

// ── FACE ID / WebAuthn
const FACEID_KEY = 'jigong_faceid_enabled';
const FACEID_CRED = 'jigong_faceid_cred';

function isWebAuthnSupported() {
  return window.PublicKeyCredential !== undefined;
}

async function initAuth() {
  const enabled = localStorage.getItem(FACEID_KEY);
  if (!enabled || !isWebAuthnSupported()) {
    // 沒設定過：直接顯示主畫面，底部顯示「設定 Face ID」提示
    if (isWebAuthnSupported()) {
      document.getElementById('faceidHint').style.display = 'block';
    }
    return;
  }
  // 有設定：顯示 lock screen
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('lockAuthBtn').textContent = '使用 Face ID 解鎖';
}

async function doAuth() {
  const btn = document.getElementById('lockAuthBtn');
  btn.textContent = '驗證中…';
  btn.disabled = true;

  try {
    const credId = localStorage.getItem(FACEID_CRED);
    if (!credId) { skipAuth(); return; }

    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: base64ToBytes(credId), type: 'public-key' }],
        userVerification: 'required',
        timeout: 60000,
      }
    });

    if (assertion) {
      document.getElementById('lockScreen').classList.add('hidden');
    }
  } catch(e) {
    document.getElementById('lockSub').textContent = '驗證失敗，請重試';
    btn.textContent = '使用 Face ID 解鎖';
    btn.disabled = false;
  }
}

function skipAuth() {
  document.getElementById('lockScreen').classList.add('hidden');
}

async function showFaceidSetup() {
  if (!isWebAuthnSupported()) {
    showToast('此裝置不支援 Face ID');
    return;
  }
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);

    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: '濟公日記', id: location.hostname },
        user: { id: userId, name: 'user', displayName: '使用者' },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
        },
        timeout: 60000,
      }
    });

    if (cred) {
      localStorage.setItem(FACEID_KEY, '1');
      localStorage.setItem(FACEID_CRED, bytesToBase64(new Uint8Array(cred.rawId)));
      document.getElementById('faceidHint').style.display = 'none';
      showToast('Face ID 設定完成 ✦');
    }
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      showToast('已取消設定');
    } else {
      showToast('設定失敗：' + e.message);
    }
  }
}

function base64ToBytes(base64) {
  const bin = atob(base64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

function bytesToBase64(bytes) {
  return btoa(String.fromCharCode(...bytes));
}

// 啟動驗證
initAuth();

function toggleCalSection() {
  const body = document.getElementById('calBody');
  const toggle = document.getElementById('sectionToggle');
  const isCollapsed = body.classList.toggle('collapsed');
  toggle.style.transform = isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// ── EDIT MODAL
let editPageId = '';
let editMood = '';

const editOverlay = document.getElementById('editModalOverlay');

function openEditModal(pageId, dateVal, msg, mood) {
  editPageId = pageId;
  editMood = mood;
  document.getElementById('editModalDate').textContent = dateVal;
  document.getElementById('editMessageInput').value = msg;

  // 選中對應的 mood
  editOverlay.querySelectorAll('.mood-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.mood === mood);
  });

  editOverlay.classList.add('open');
}

function closeEditModal() {
  editOverlay.classList.remove('open');
}

editOverlay.addEventListener('click', e => {
  if (e.target === editOverlay) closeEditModal();
});

function selectEditMood(el) {
  editOverlay.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  editMood = el.dataset.mood;
}

async function saveEdit() {
  const msg = document.getElementById('editMessageInput').value.trim();
  if (!msg) { showToast('請先寫幾個字'); return; }

  const btn = document.getElementById('editSaveBtn');
  btn.textContent = '儲存中…';
  btn.classList.add('loading');

  const body = {
    properties: {
      Message: { rich_text: [{ text: { content: msg } }] },
      ...(editMood ? { Mood: { select: { name: editMood } } } : { Mood: { select: null } })
    }
  };

  try {
    const resp = await fetch(`${API}/v1/pages/${editPageId}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      showToast('已更新 ✦');
      closeEditModal();
      loadEntries();
    } else {
      showToast(`更新失敗（HTTP ${resp.status}）`);
    }
  } catch(e) {
    showToast('無法連線');
  }

  btn.textContent = '儲存';
  btn.classList.remove('loading');
}
</script>
</body>
</html>
